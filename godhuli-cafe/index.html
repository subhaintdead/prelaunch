<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F2E0C6" />
<title>Godhuli — Cafe & Bistro</title>
<meta name="description" content="Godhuli Cafe & Bistro — burgers, chowmein and fresh-fried snacks. Order online for delivery in 30–35 minutes." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F2E0C6;            /* creamy base */
    --paper:#F7EAD3;         /* raised cream surfaces */
    --paper-2:#FBF3E4;       /* lightest cream */
    --ink:#3B2A1A;           /* chocolate text (tweak later) */
    --ink-70:rgba(59,42,26,.7);
    --ink-45:rgba(59,42,26,.45);
    --ink-25:rgba(59,42,26,.22);
    --line:#E2CBA6;          /* hairline on cream */
    --line-soft:#EAD9BB;
    --veg:#4E7B3A;
    --nonveg:#B0402E;
    --shadow-sm:0 2px 6px rgba(59,42,26,.06);
    --shadow-md:0 20px 44px -26px rgba(59,42,26,.5);
    --shadow-lg:0 30px 70px -30px rgba(59,42,26,.55);
    --font-display:'Fraunces', Georgia, 'Times New Roman', serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);
    --shell:640px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  h1,h2,h3,h4,p{ margin:0; }
  button{ font:inherit; border:none; background:none; color:inherit; cursor:pointer; }
  html,body{ margin:0; padding:0; }
  html{ background:var(--bg); scroll-behavior:smooth; }
  body{
    background:var(--bg);
    font-family:var(--font-body);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection{ background:var(--ink); color:var(--bg); }
  :focus-visible{ outline:2px solid var(--ink); outline-offset:3px; border-radius:4px; }
  img{ max-width:100%; display:block; }

  .wrap{ width:100%; max-width:var(--shell); margin:0 auto; padding:0 22px; }

  /* ============ Reveal animation ============ */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .9s var(--ease), transform .9s var(--ease); will-change:opacity,transform; }
  .reveal.in{ opacity:1; transform:none; }

  /* ============ Top bar ============ */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:60;
    transition:background .4s var(--ease), border-color .4s var(--ease), backdrop-filter .4s;
    border-bottom:1px solid transparent;
  }
  .topbar.scrolled{
    background:rgba(242,224,198,.82);
    backdrop-filter:saturate(1.4) blur(16px);
    border-bottom:1px solid var(--line);
  }
  .topbar__inner{ display:flex; align-items:center; justify-content:space-between; height:60px; }
  .topbar__brand{
    font-family:var(--font-display); font-weight:600; font-size:19px; letter-spacing:.01em;
    opacity:0; transform:translateY(-6px); transition:opacity .4s var(--ease), transform .4s var(--ease); pointer-events:none;
  }
  .topbar.scrolled .topbar__brand{ opacity:1; transform:none; pointer-events:auto; }
  .topbar__right{ display:flex; align-items:center; gap:10px; }

  /* veg toggle */
  .veg-switch{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:12.5px; font-weight:600; color:var(--ink-70); }
  .veg-switch input{ position:absolute; opacity:0; pointer-events:none; }
  .veg-switch .track{ width:38px; height:22px; border-radius:999px; background:var(--line); position:relative; transition:background .25s var(--ease); flex:0 0 auto; }
  .veg-switch .track::after{ content:""; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:var(--paper-2); box-shadow:var(--shadow-sm); transition:transform .25s var(--ease); }
  .veg-switch input:checked + .track{ background:var(--veg); }
  .veg-switch input:checked + .track::after{ transform:translateX(16px); }

  .icon-btn{
    width:42px; height:42px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    background:var(--ink); color:var(--bg); position:relative; box-shadow:var(--shadow-sm);
    transition:transform .18s var(--ease);
  }
  .icon-btn:active{ transform:scale(.92); }
  .icon-btn .badge{
    position:absolute; top:-4px; right:-4px; min-width:19px; height:19px; padding:0 5px; border-radius:999px;
    background:var(--nonveg); color:#fff; font-size:11px; font-weight:700; display:none; align-items:center; justify-content:center;
    border:2px solid var(--bg);
  }
  .icon-btn .badge.show{ display:inline-flex; }

  /* ============ Hero ============ */
  .hero{ position:relative; padding-top:118px; padding-bottom:44px; }
  .hero__kicker{ display:flex; align-items:center; gap:12px; font-size:11.5px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:var(--ink-45); }
  .hero__kicker span.rule{ flex:1; height:1px; background:var(--line); }
  .hero__title{
    font-family:var(--font-display); font-weight:600; line-height:.86; letter-spacing:-.02em;
    font-size:clamp(76px, 27vw, 168px); margin:22px 0 0; color:var(--ink);
  }
  .hero__title .a{ display:block; overflow:hidden; }
  .hero__title .a > span{ display:block; transform:translateY(105%); animation:rise 1s var(--ease) forwards; }
  .hero__title .a:nth-child(1) > span{ animation-delay:.05s; }
  .hero__sub{
    font-family:var(--font-display); font-style:italic; font-weight:400; color:var(--ink-70);
    font-size:clamp(18px,5vw,23px); line-height:1.4; margin-top:22px; max-width:22ch;
    opacity:0; animation:fadeUp .8s var(--ease) .55s forwards;
  }
  .hero__meta{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:26px;
    opacity:0; animation:fadeUp .8s var(--ease) .7s forwards;
  }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border:1px solid var(--line); border-radius:999px; font-size:12.5px; font-weight:600; color:var(--ink-70); background:var(--paper); }
  .chip svg{ width:14px; height:14px; }
  .hero__cta{ margin-top:30px; opacity:0; animation:fadeUp .8s var(--ease) .85s forwards; }
  .btn-ink{
    display:inline-flex; align-items:center; gap:10px; background:var(--ink); color:var(--bg);
    font-weight:600; font-size:15px; padding:16px 26px; border-radius:999px; box-shadow:var(--shadow-md);
    transition:transform .2s var(--ease), box-shadow .2s var(--ease);
  }
  .btn-ink:hover{ transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .btn-ink:active{ transform:translateY(0) scale(.98); }
  .btn-ink svg{ width:17px; height:17px; transition:transform .25s var(--ease); }
  .hero__cta:hover .btn-ink svg{ transform:translateY(3px); }

  @keyframes rise{ to{ transform:translateY(0); } }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:none; } }

  /* ============ Category nav ============ */
  .catnav{ position:sticky; top:60px; z-index:50; background:rgba(242,224,198,0); transition:background .4s var(--ease), box-shadow .4s; }
  .catnav.stuck{ background:rgba(242,224,198,.9); backdrop-filter:saturate(1.4) blur(14px); box-shadow:0 1px 0 var(--line); }
  .catnav__inner{ display:flex; gap:26px; overflow-x:auto; scrollbar-width:none; padding:16px 0; }
  .catnav__inner::-webkit-scrollbar{ display:none; }
  .cat-pill{ position:relative; white-space:nowrap; font-size:14px; font-weight:600; color:var(--ink-45); padding-bottom:6px; transition:color .25s var(--ease); }
  .cat-pill::after{ content:""; position:absolute; left:0; bottom:0; height:2px; width:100%; background:var(--ink); transform:scaleX(0); transform-origin:left; transition:transform .3s var(--ease); }
  .cat-pill.active{ color:var(--ink); }
  .cat-pill.active::after{ transform:scaleX(1); }

  /* ============ Menu sections ============ */
  main{ padding-bottom:40px; }
  .menu-section{ scroll-margin-top:118px; padding-top:26px; }
  .section-head{ display:flex; align-items:baseline; gap:16px; margin:14px 0 22px; }
  .section-head__num{
    font-family:var(--font-display); font-weight:500; font-size:15px; color:var(--ink-45);
    letter-spacing:.02em; flex:0 0 auto; padding-top:6px;
  }
  .section-head__title{ font-family:var(--font-display); font-weight:600; letter-spacing:-.02em; line-height:.98; font-size:clamp(34px,9.5vw,52px); }
  .section-head__rule{ flex:1; height:1px; background:var(--line); align-self:flex-end; margin-bottom:12px; }

  .item-grid{ display:grid; gap:26px; }

  .item-card{ position:relative; transition:opacity .3s var(--ease); }
  .item-photo{
    position:relative; aspect-ratio:4/3; border-radius:20px; overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 0%, var(--paper-2), var(--paper) 70%);
    border:1px solid var(--line); box-shadow:var(--shadow-sm);
    display:flex; align-items:center; justify-content:center;
    transition:transform .5s var(--ease), box-shadow .5s var(--ease);
  }
  .item-card:hover .item-photo{ transform:translateY(-4px); box-shadow:var(--shadow-md); }
  .item-photo img{ width:100%; height:100%; object-fit:cover; }
  .photo-ph{ color:var(--ink-25); display:flex; flex-direction:column; align-items:center; gap:8px; }
  .photo-ph svg{ width:34px; height:34px; }
  .photo-ph .shine{
    position:absolute; inset:0; background:linear-gradient(105deg, transparent 30%, rgba(255,255,255,.35) 50%, transparent 70%);
    transform:translateX(-100%); animation:shine 4.5s var(--ease) infinite; pointer-events:none;
  }
  @keyframes shine{ 0%,60%{ transform:translateX(-100%); } 100%{ transform:translateX(100%); } }

  .veg-badge{
    position:absolute; top:12px; left:12px; width:20px; height:20px; border-radius:5px; background:var(--paper-2);
    border:1.5px solid var(--nonveg); display:flex; align-items:center; justify-content:center; z-index:2; box-shadow:var(--shadow-sm);
  }
  .veg-badge::after{ content:""; width:9px; height:9px; border-radius:50%; background:var(--nonveg); }
  .veg-badge.veg{ border-color:var(--veg); }
  .veg-badge.veg::after{ background:var(--veg); }

  .item-body{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-top:16px; }
  .item-text{ min-width:0; }
  .item-name{ font-family:var(--font-display); font-weight:600; letter-spacing:-.01em; font-size:clamp(20px,5.4vw,25px); line-height:1.12; }
  .item-price{ margin-top:6px; font-size:15px; font-weight:600; color:var(--ink-70); }
  .item-price .cur{ font-size:12px; margin-right:1px; opacity:.7; }
  .item-action{ flex:0 0 auto; }

  /* Add button + stepper */
  .add-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--paper-2); color:var(--ink); border:1.5px solid var(--ink);
    font-weight:600; font-size:14px; padding:11px 20px; border-radius:999px; box-shadow:var(--shadow-sm);
    transition:transform .18s var(--ease), background .2s var(--ease), color .2s var(--ease);
  }
  .add-btn:hover{ background:var(--ink); color:var(--bg); }
  .add-btn:active{ transform:scale(.94); }

  .stepper{ display:inline-flex; align-items:center; background:var(--ink); color:var(--bg); border-radius:999px; box-shadow:var(--shadow-sm); }
  .stepper button{ width:40px; height:42px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:500; color:var(--bg); }
  .stepper button:active{ transform:scale(.9); }
  .stepper span{ min-width:22px; text-align:center; font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; }

  .pop{ animation:pop .28s var(--ease); }
  @keyframes pop{ 0%{ transform:scale(.85); opacity:.4; } 100%{ transform:scale(1); opacity:1; } }

  /* veg-only filter */
  body.veg-only .item-card[data-veg="false"]{ display:none; }

  /* ============ Footer ============ */
  .foot{ text-align:center; padding:48px 0 30px; border-top:1px solid var(--line); margin-top:36px; }
  .foot__mark{ font-family:var(--font-display); font-weight:600; font-size:26px; }
  .foot p{ margin-top:8px; font-size:12.5px; color:var(--ink-45); letter-spacing:.02em; }

  /* ============ Cart bar ============ */
  .cart-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:55;
    padding:0 16px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(140%); transition:transform .45s var(--ease);
    pointer-events:none;
  }
  .cart-bar.show{ transform:translateY(0); pointer-events:auto; }
  .cart-bar__inner{
    max-width:var(--shell); margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:14px;
    background:var(--ink); color:var(--bg); border-radius:18px; padding:12px 12px 12px 18px; box-shadow:var(--shadow-lg);
  }
  .cart-bar__left{ display:flex; align-items:center; gap:13px; min-width:0; }
  .cart-bar__count{ width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex:0 0 auto; }
  .cart-bar__meta{ display:flex; flex-direction:column; line-height:1.25; min-width:0; }
  .cart-bar__meta .lbl{ font-size:12px; opacity:.75; }
  .cart-bar__meta .amt{ font-weight:700; font-size:16px; }
  .cart-bar__btn{ display:inline-flex; align-items:center; gap:6px; background:var(--bg); color:var(--ink); font-weight:600; font-size:14px; padding:11px 18px; border-radius:12px; flex:0 0 auto; }

  /* ============ Drawer ============ */
  .drawer-overlay{ position:fixed; inset:0; z-index:70; background:rgba(40,28,16,.44); backdrop-filter:blur(3px); opacity:0; visibility:hidden; transition:opacity .35s var(--ease), visibility .35s; }
  .drawer-overlay.open{ opacity:1; visibility:visible; }
  .drawer{
    position:absolute; left:0; right:0; bottom:0; max-width:var(--shell); margin:0 auto;
    background:var(--bg); border-radius:26px 26px 0 0; box-shadow:var(--shadow-lg);
    transform:translateY(100%); transition:transform .42s var(--ease);
    display:flex; flex-direction:column; max-height:92vh;
  }
  .drawer-overlay.open .drawer{ transform:translateY(0); }
  .drawer__grip{ width:42px; height:4px; border-radius:999px; background:var(--line); margin:12px auto 4px; flex:0 0 auto; }
  .drawer__header{ display:flex; align-items:center; justify-content:space-between; padding:8px 22px 16px; border-bottom:1px solid var(--line); }
  .drawer__header-left{ display:flex; align-items:center; gap:12px; }
  .drawer__back{ width:34px; height:34px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:var(--paper); }
  .drawer__header h2{ font-family:var(--font-display); font-weight:600; font-size:23px; }
  .drawer__close{ width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:var(--paper); }
  .drawer__body{ overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px 22px 8px; }
  .drawer__footer{ border-top:1px solid var(--line); padding:16px 22px calc(18px + env(safe-area-inset-bottom)); background:var(--bg); }

  /* cart rows */
  .cart-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:16px 0; border-bottom:1px solid var(--line-soft); }
  .cart-row:last-child{ border-bottom:none; }
  .cart-row__name{ font-family:var(--font-display); font-weight:600; font-size:17px; }
  .cart-row__meta{ font-size:12.5px; color:var(--ink-45); margin-top:2px; }
  .cart-row__right{ display:flex; align-items:center; gap:14px; }
  .cart-row__total{ font-weight:700; font-size:15px; min-width:56px; text-align:right; font-variant-numeric:tabular-nums; }
  .cart-row .stepper{ background:var(--paper); color:var(--ink); border:1px solid var(--line); }
  .cart-row .stepper button{ color:var(--ink); height:38px; width:36px; }

  .empty-cart{ text-align:center; padding:44px 20px 52px; color:var(--ink-45); }
  .empty-cart svg{ width:46px; height:46px; margin:0 auto 14px; opacity:.5; }
  .empty-cart h3{ font-family:var(--font-display); font-weight:600; font-size:21px; color:var(--ink); }
  .empty-cart p{ margin-top:6px; font-size:13.5px; }

  /* progress / hints */
  .progress{ height:7px; border-radius:999px; background:var(--line); overflow:hidden; margin-bottom:10px; }
  .progress__bar{ height:100%; background:var(--ink); border-radius:999px; transition:width .5s var(--ease); }
  .free-delivery-hint{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--ink-70); margin-bottom:14px; }
  .free-delivery-hint svg{ width:16px; height:16px; }
  .free-delivery-hint.done{ color:var(--veg); }

  .summary-row{ display:flex; align-items:center; justify-content:space-between; font-size:14px; color:var(--ink-70); padding:5px 0; }
  .summary-row.total{ color:var(--ink); font-weight:700; font-size:16px; padding-top:12px; margin-top:6px; border-top:1px dashed var(--line); }
  .summary-row .num{ font-variant-numeric:tabular-nums; }
  .free-tag{ color:var(--veg); font-weight:700; font-size:12.5px; letter-spacing:.04em; }
  .drawer__summary{ margin-bottom:14px; }

  .btn-primary{
    width:100%; background:var(--ink); color:var(--bg); font-weight:600; font-size:16px;
    padding:17px; border-radius:16px; box-shadow:var(--shadow-md); transition:transform .18s var(--ease), box-shadow .2s;
  }
  .btn-primary:hover{ transform:translateY(-1px); }
  .btn-primary:active{ transform:scale(.99); }
  .btn-primary:disabled{ opacity:.6; cursor:default; transform:none; }

  /* checkout form */
  .checkout-summary{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:22px; }
  .form-field{ margin-bottom:18px; }
  .form-label{ display:block; font-size:12.5px; font-weight:700; letter-spacing:.02em; color:var(--ink-70); margin-bottom:8px; }
  .form-input, .form-textarea{
    width:100%; font:inherit; font-size:15px; color:var(--ink); background:var(--paper-2);
    border:1.5px solid var(--line); border-radius:14px; padding:14px 15px; transition:border-color .2s var(--ease), box-shadow .2s;
  }
  .form-input::placeholder, .form-textarea::placeholder{ color:var(--ink-25); }
  .form-input:focus, .form-textarea:focus{ outline:none; border-color:var(--ink); box-shadow:0 0 0 3px rgba(59,42,26,.1); }
  .form-textarea{ min-height:84px; resize:vertical; line-height:1.5; }
  .form-input.error, .form-textarea.error{ border-color:var(--nonveg); box-shadow:0 0 0 3px rgba(176,64,46,.12); }
  .form-error{ font-size:12px; color:var(--nonveg); font-weight:600; margin-top:6px; max-height:0; overflow:hidden; opacity:0; transition:all .25s var(--ease); }
  .form-error.show{ max-height:40px; opacity:1; margin-top:7px; }
  .form-hint{ font-size:12px; color:var(--ink-45); margin-top:7px; }
  .form-alert{ background:rgba(176,64,46,.1); border:1px solid rgba(176,64,46,.3); color:var(--nonveg); font-size:13px; font-weight:600; padding:12px 14px; border-radius:12px; margin-bottom:18px; }

  .pay-options{ display:grid; gap:10px; }
  .pay-option{ display:flex; align-items:center; gap:13px; padding:14px; border:1.5px solid var(--line); border-radius:14px; cursor:pointer; background:var(--paper-2); transition:border-color .2s var(--ease), background .2s; }
  .pay-option input{ position:absolute; opacity:0; pointer-events:none; }
  .pay-option__icon{ width:38px; height:38px; border-radius:10px; background:var(--paper); display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--ink-70); }
  .pay-option__icon svg{ width:19px; height:19px; }
  .pay-option__title{ font-weight:600; font-size:14.5px; }
  .pay-option__sub{ font-size:12px; color:var(--ink-45); margin-top:2px; }
  .pay-option:has(input:checked){ border-color:var(--ink); background:var(--paper); }
  .pay-option:has(input:checked) .pay-option__icon{ background:var(--ink); color:var(--bg); }

  /* success */
  .order-success{ text-align:center; padding:26px 10px 18px; }
  .success-ring{ width:74px; height:74px; border-radius:50%; background:var(--veg); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; box-shadow:0 12px 30px -12px rgba(78,123,58,.7); animation:pop .4s var(--ease); }
  .success-ring svg{ width:34px; height:34px; }
  .order-success h3{ font-family:var(--font-display); font-weight:600; font-size:26px; }
  .order-success p{ margin-top:8px; font-size:14px; color:var(--ink-70); line-height:1.5; }
  .oid{ display:inline-block; margin-top:14px; font-weight:700; font-size:13px; letter-spacing:.06em; padding:7px 14px; border-radius:999px; background:var(--paper); border:1px solid var(--line); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
    .reveal{ opacity:1; transform:none; }
    html{ scroll-behavior:auto; }
    .hero__title .a > span{ transform:none; }
    .hero__sub,.hero__meta,.hero__cta{ opacity:1; }
  }

  @media (min-width:560px){
    .item-grid{ grid-template-columns:1fr 1fr; gap:30px 26px; }
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <div class="wrap topbar__inner">
      <div class="topbar__brand">Godhuli</div>
      <div class="topbar__right">
        <label class="veg-switch" title="Show vegetarian only">
          <input type="checkbox" id="vegToggle" />
          <span class="track"></span>
          <span>Veg only</span>
        </label>
        <button class="icon-btn" id="cartIconBtn" aria-label="View cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.6 13.4a2 2 0 0 0 2 1.6h8.2a2 2 0 0 0 2-1.6L23 7H6"/></svg>
          <span class="badge" id="cartIconBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="wrap">
      <div class="hero__kicker"><span>Cafe &amp; Bistro</span><span class="rule"></span><span>Est. Twilight</span></div>
      <h1 class="hero__title"><span class="a"><span>Godhuli</span></span></h1>
      <p class="hero__sub">Burgers, chowmein &amp; fresh-fried snacks — made to order as the evening settles in.</p>
      <div class="hero__meta">
        <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>30–35 min delivery</span>
        <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M14 9h4l4 4v4a1 1 0 0 1-1 1h-1"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>Free delivery over ₹300</span>
      </div>
      <div class="hero__cta">
        <button class="btn-ink" id="viewMenuBtn">View the Menu
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- Category nav -->
  <nav class="catnav" id="catnav" aria-label="Menu categories">
    <div class="wrap"><div class="catnav__inner" id="catnavInner"></div></div>
  </nav>

  <!-- Menu -->
  <main>
    <div class="wrap" id="menuRoot"></div>

    <div class="wrap">
      <div class="foot reveal">
        <div class="foot__mark">Godhuli</div>
        <p>Prices inclusive of taxes · Made fresh on order</p>
      </div>
    </div>
  </main>

  <!-- Cart bar -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar__inner" role="button" tabindex="0" aria-label="View cart">
      <span class="cart-bar__left">
        <span class="cart-bar__count" id="cartBarCount">0</span>
        <span class="cart-bar__meta">
          <span class="lbl" id="cartBarLbl">0 items in cart</span>
          <span class="amt" id="cartBarAmt">₹0</span>
        </span>
      </span>
      <span class="cart-bar__btn">View Cart
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </div>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" role="dialog" aria-modal="true" aria-label="Your cart">
      <div class="drawer__grip" aria-hidden="true"></div>
      <div class="drawer__header">
        <div class="drawer__header-left">
          <button class="drawer__back" id="drawerBack" aria-label="Back to cart" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <h2 id="drawerTitle">Your Order</h2>
        </div>
        <button class="drawer__close" id="drawerClose" aria-label="Close cart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="drawer__body" id="drawerBody"></div>
      <div class="drawer__footer" id="drawerFooter"></div>
    </div>
  </div>

<script>
  // ---------- Menu data (unchanged) ----------
  // To add a photo for an item, add an `img` field, e.g. img:'images/falafel-kebab.jpg'
  const MENU_SECTIONS = [
    {
      key: 'burgers', target: 'list-burgers', title: 'Burgers & Kebabs',
      groups: [
        { label: null, veg: null, items: [
          { id:'chicken-strips-burger', veg:false, emoji:'🍔', name:'Chicken Strips Burger', price:99 },
          { id:'falafel-kebab',         veg:true,  emoji:'🧆', name:'Falafel Kebab (6 pc)', price:69 },
          { id:'harabhara-kebab',       veg:true,  emoji:'🥦', name:'Harabhara Kebab (6 pc)', price:69 },
        ]},
      ],
    },
    {
      key: 'chowmein', target: 'list-chowmein', title: 'Chowmein',
      groups: [
        { label: null, veg: null, items: [
          { id:'egg-chicken-chowmein', veg:false, emoji:'🍜', name:'Egg Chicken Chowmein', price:110 },
          { id:'chicken-chowmein',     veg:false, emoji:'🍜', name:'Chicken Chowmein', price:89 },
          { id:'egg-chowmein',         veg:false, emoji:'🍜', name:'Egg Chowmein', price:69 },
          { id:'veg-chowmein',         veg:true,  emoji:'🍜', name:'Veg Chowmein', price:59 },
        ]},
      ],
    },
    {
      key: 'snacks', target: 'list-snacks', title: 'Snacks & Starters',
      groups: [
        { label: null, veg: null, items: [
          { id:'potato-shots',    veg:true,  emoji:'🥔', name:'Potato Shots (15 pc)', price:49 },
          { id:'veg-pakora',      veg:true,  emoji:'🧅', name:'Veg Pakora (10 pc)', price:79 },
          { id:'chicken-pakora',  veg:false, emoji:'🍗', name:'Chicken Pakora (8 pc)', price:99 },
          { id:'chicken-wings',   veg:false, emoji:'🍗', name:'Chicken Wings (4 pc)', price:99 },
          { id:'chicken-nuggets', veg:false, emoji:'🍗', name:'Chicken Nuggets (6 pc)', price:99 },
          { id:'french-fries',    veg:true,  emoji:'🍟', name:'French Fries', price:69 },
        ]},
      ],
    },
  ];

  const FREE_DELIVERY_MIN = 300;
  const DELIVERY_FEE = 20;

  let cart = {}; // id -> { name, price, qty }
  let drawerStep = 'cart'; // 'cart' | 'checkout' | 'success'
  let checkoutData = { name: '', phone: '', address: '', payment: 'cod' };
  let checkoutTouched = { name: false, phone: false, address: false };
  let checkoutError = '';
  let placingOrder = false;
  let lastOrder = null;

  function money(n){ return '₹' + Number(n).toLocaleString('en-IN'); }
  function esc(s){ return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  const PHOTO_PH = `<div class="photo-ph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="2"/><path d="m4 18 5-4 4 3 3-2 4 3"/></svg><span class="shine"></span></div>`;

  const menuRoot = document.getElementById('menuRoot');
  const catnavInner = document.getElementById('catnavInner');

  // ---------- Build category nav + menu sections from data ----------
  function buildScaffold(){
    catnavInner.innerHTML = MENU_SECTIONS.map((s, i) =>
      `<button class="cat-pill${i === 0 ? ' active' : ''}" data-target="${s.target}">${esc(s.title)}</button>`
    ).join('');

    menuRoot.innerHTML = MENU_SECTIONS.map((s, i) => `
      <section class="menu-section" id="${s.target}">
        <div class="section-head reveal">
          <span class="section-head__num">${String(i + 1).padStart(2, '0')}</span>
          <h2 class="section-head__title">${esc(s.title)}</h2>
          <span class="section-head__rule"></span>
        </div>
        <div class="item-grid" data-grid-for="${s.target}"></div>
      </section>`).join('');
  }

  function renderMenu(){
    MENU_SECTIONS.forEach(section => {
      const grid = document.querySelector(`[data-grid-for="${section.target}"]`);
      const items = section.groups.flatMap(g => g.items);
      grid.innerHTML = items.map(item => itemCardHTML(item)).join('');
      items.forEach(item => renderItemControl(item.id, item.price, item.name));
    });
  }

  function itemCardHTML(item){
    const photo = item.img
      ? `<img src="${esc(item.img)}" alt="${esc(item.name)}" loading="lazy" />`
      : PHOTO_PH;
    return `
      <article class="item-card reveal" data-veg="${item.veg}">
        <div class="item-photo">
          <span class="veg-badge ${item.veg ? 'veg' : ''}" aria-label="${item.veg ? 'Vegetarian' : 'Non-vegetarian'}"></span>
          ${photo}
        </div>
        <div class="item-body">
          <div class="item-text">
            <h3 class="item-name">${item.name}</h3>
            <div class="item-price"><span class="cur">₹</span>${Number(item.price).toLocaleString('en-IN')}</div>
          </div>
          <div class="item-action" data-control-for="${item.id}"></div>
        </div>
      </article>`;
  }

  function renderItemControl(id, price, name){
    const el = document.querySelector(`[data-control-for="${id}"]`);
    if (!el) return;
    const qty = cart[id] ? cart[id].qty : 0;
    if (qty === 0){
      el.innerHTML = `<button class="add-btn pop" data-action="add" data-id="${id}" data-name="${esc(name)}" data-price="${price}">Add +</button>`;
    } else {
      el.innerHTML = `
        <div class="stepper pop">
          <button data-action="dec" data-id="${id}" aria-label="Remove one ${esc(name)}">−</button>
          <span>${qty}</span>
          <button data-action="inc" data-id="${id}" aria-label="Add one more ${esc(name)}">+</button>
        </div>`;
    }
  }

  // ---------- Cart logic (event delegation) ----------
  function haptic(ms){
    if (navigator.vibrate){
      try { navigator.vibrate(ms); } catch (e) { /* unsupported / blocked, ignore */ }
    }
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;

    if (action === 'add'){
      const name = btn.dataset.name;
      const price = Number(btn.dataset.price);
      cart[id] = { name, price, qty: 1 };
    } else if (action === 'inc'){
      if (cart[id]) cart[id].qty++;
    } else if (action === 'dec'){
      if (cart[id]){
        cart[id].qty--;
        if (cart[id].qty <= 0) delete cart[id];
      }
    } else {
      return;
    }
    haptic(action === 'add' ? 18 : 10);
    afterCartChange(id);
  });

  function findMenuItem(id){
    for (const section of MENU_SECTIONS){
      for (const group of section.groups){
        const found = group.items.find(i => i.id === id);
        if (found) return found;
      }
    }
    return null;
  }

  function afterCartChange(id){
    const item = findMenuItem(id);
    if (item) renderItemControl(item.id, item.price, item.name);
    updateCartBar();
    if (drawerOverlay.classList.contains('open') && drawerStep === 'cart') renderDrawer();
  }

  function cartCount(){ return Object.values(cart).reduce((s, i) => s + i.qty, 0); }
  function cartSubtotal(){ return Object.values(cart).reduce((s, i) => s + i.qty * i.price, 0); }

  const cartBar = document.getElementById('cartBar');
  const cartBarCount = document.getElementById('cartBarCount');
  const cartBarLbl = document.getElementById('cartBarLbl');
  const cartBarAmt = document.getElementById('cartBarAmt');
  const cartIconBadge = document.getElementById('cartIconBadge');

  function updateCartBar(){
    const count = cartCount();
    const subtotal = cartSubtotal();
    cartBarCount.textContent = count;
    cartBarLbl.textContent = `${count} item${count === 1 ? '' : 's'} in cart`;
    cartBarAmt.textContent = money(subtotal);
    cartBar.classList.toggle('show', count > 0);
    cartIconBadge.textContent = count;
    cartIconBadge.classList.toggle('show', count > 0);
  }

  cartBar.addEventListener('click', openDrawer);
  cartBar.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDrawer(); } });
  document.getElementById('cartIconBtn').addEventListener('click', openDrawer);

  // ---------- Drawer ----------
  const drawerOverlay = document.getElementById('drawerOverlay');
  const drawerBody = document.getElementById('drawerBody');
  const drawerFooter = document.getElementById('drawerFooter');
  const drawerTitle = document.getElementById('drawerTitle');
  const drawerBack = document.getElementById('drawerBack');

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  drawerOverlay.addEventListener('click', (e) => { if (e.target === drawerOverlay) closeDrawer(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

  function openDrawer(){ drawerStep = 'cart'; renderDrawer(); drawerOverlay.classList.add('open'); }
  function closeDrawer(){ drawerOverlay.classList.remove('open'); }

  function setDrawerHeader(title, showBack){
    drawerTitle.textContent = title;
    drawerBack.style.display = showBack ? 'inline-flex' : 'none';
  }

  function renderDrawer(){
    renderCartStep();
  }

  function renderCartStep(){
    setDrawerHeader('Your Order', false);
    const entries = Object.entries(cart);

    if (entries.length === 0){
      drawerBody.innerHTML = `
        <div class="empty-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M2 3h3l2.6 13.4a2 2 0 0 0 2 1.6h8.2a2 2 0 0 0 2-1.6L23 7H6"/></svg>
          <h3>Your cart is empty</h3>
          <p>Add something delicious to get started.</p>
        </div>`;
      drawerFooter.innerHTML = '';
      return;
    }

    drawerBody.innerHTML = entries.map(([id, item]) => `
      <div class="cart-row">
        <div class="cart-row__info">
          <div class="cart-row__name">${item.name}</div>
          <div class="cart-row__meta">${money(item.price)} each</div>
        </div>
        <div class="cart-row__right">
          <div class="stepper">
            <button data-action="dec" data-id="${id}" aria-label="Remove one ${esc(item.name)}">−</button>
            <span>${item.qty}</span>
            <button data-action="inc" data-id="${id}" aria-label="Add one more ${esc(item.name)}">+</button>
          </div>
          <div class="cart-row__total">${money(item.price * item.qty)}</div>
        </div>
      </div>`).join('');

    const subtotal = cartSubtotal();
    const deliveryFee = subtotal >= FREE_DELIVERY_MIN ? 0 : DELIVERY_FEE;
    const total = subtotal + deliveryFee;

    let hint = '';
    if (subtotal > 0 && subtotal < FREE_DELIVERY_MIN){
      const pct = Math.min(100, Math.round((subtotal / FREE_DELIVERY_MIN) * 100));
      hint = `
        <div class="progress"><div class="progress__bar" style="width:${pct}%"></div></div>
        <div class="free-delivery-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M14 9h4l4 4v4a1 1 0 0 1-1 1h-1"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
          Add ${money(FREE_DELIVERY_MIN - subtotal)} more for FREE delivery
        </div>`;
    } else {
      hint = `
        <div class="free-delivery-hint done">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
          You've unlocked FREE delivery
        </div>`;
    }

    drawerFooter.innerHTML = `
      <div class="drawer__summary">
        ${hint}
        <div class="summary-row"><span>Item Total</span><span>${money(subtotal)}</span></div>
        <div class="summary-row"><span>Delivery Fee</span><span>${deliveryFee === 0 ? '<span class="free-tag">FREE</span>' : money(deliveryFee)}</span></div>
        <div class="summary-row total"><span>Grand Total</span><span class="num">${money(total)}</span></div>
      </div>
      <div class="drawer__checkout">
        <button class="btn-primary" id="checkoutStepBtn">Proceed to Checkout · ${money(total)}</button>
      </div>`;

    document.getElementById('checkoutStepBtn').addEventListener('click', goToCheckout);
  }

  // ---------- Checkout step ----------
  function goToCheckout(){
    drawerStep = 'checkout';
    checkoutError = '';
    renderCheckoutStep();
    drawerBody.scrollTop = 0;
  }

  function normalizePhone(v){
    let d = String(v || '').replace(/\D/g, '');
    if (d.length === 12 && d.startsWith('91')) d = d.slice(2);
    if (d.length === 11 && d.startsWith('0')) d = d.slice(1);
    return d;
  }
  function isValidName(v){ return String(v || '').trim().length >= 2; }
  function isValidPhone(v){ return /^[6-9]\d{9}$/.test(normalizePhone(v)); }
  function isValidAddress(v){ return String(v || '').trim().length >= 10; }

  function fieldValid(f){
    if (f === 'name') return isValidName(checkoutData.name);
    if (f === 'phone') return isValidPhone(checkoutData.phone);
    if (f === 'address') return isValidAddress(checkoutData.address);
    return true;
  }
  const fieldErrorMsg = {
    name: 'Please enter your name.',
    phone: 'Enter a valid 10-digit mobile number.',
    address: 'Add your complete address with a landmark.',
  };

  function showFieldError(f, forceShow){
    const input = document.querySelector(`[data-field="${f}"]`);
    const errorEl = document.getElementById(`err-${f}`);
    const touched = forceShow || checkoutTouched[f];
    const show = touched && !fieldValid(f);
    if (input) input.classList.toggle('error', show);
    if (errorEl){
      errorEl.textContent = fieldErrorMsg[f] || '';
      errorEl.classList.toggle('show', show);
    }
  }

  function renderCheckoutStep(){
    setDrawerHeader('Checkout', true);
    const subtotal = cartSubtotal();
    const deliveryFee = subtotal >= FREE_DELIVERY_MIN ? 0 : DELIVERY_FEE;
    const grandTotal = subtotal + deliveryFee;

    drawerBody.innerHTML = `
      ${checkoutError ? `<div class="form-alert">${esc(checkoutError)}</div>` : ''}
      <div class="checkout-summary">
        <div class="summary-row"><span>Item Total</span><span>${money(subtotal)}</span></div>
        <div class="summary-row"><span>Delivery Fee</span><span>${deliveryFee === 0 ? '<span class="free-tag">FREE</span>' : money(deliveryFee)}</span></div>
        <div class="summary-row total"><span>Grand Total</span><span class="num">${money(grandTotal)}</span></div>
      </div>

      <div class="form-field">
        <label class="form-label" for="coName">Full Name</label>
        <input class="form-input" id="coName" data-field="name" type="text" placeholder="e.g. Aditi Sharma" value="${esc(checkoutData.name)}" autocomplete="name" />
        <div class="form-error" id="err-name"></div>
      </div>

      <div class="form-field">
        <label class="form-label" for="coPhone">WhatsApp Phone Number</label>
        <input class="form-input" id="coPhone" data-field="phone" type="tel" inputmode="numeric" placeholder="10-digit mobile number" value="${esc(checkoutData.phone)}" autocomplete="tel" />
        <div class="form-error" id="err-phone"></div>
        <div class="form-hint">We'll send order updates on WhatsApp.</div>
      </div>

      <div class="form-field">
        <label class="form-label" for="coAddress">Complete Delivery Address / Landmark</label>
        <textarea class="form-textarea" id="coAddress" data-field="address" placeholder="House/flat no., street, area, nearby landmark" autocomplete="street-address">${esc(checkoutData.address)}</textarea>
        <div class="form-error" id="err-address"></div>
      </div>

      <div class="form-field">
        <label class="form-label">Payment Method</label>
        <div class="pay-options">
          <label class="pay-option" id="payOptCod">
            <input type="radio" name="payment" value="cod" data-field="payment" ${checkoutData.payment === 'cod' ? 'checked' : ''} />
            <span class="pay-option__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg></span>
            <div>
              <div class="pay-option__title">Pay on Delivery</div>
              <div class="pay-option__sub">Cash or UPI QR at the door</div>
            </div>
          </label>
          <label class="pay-option" id="payOptUpi">
            <input type="radio" name="payment" value="upi" data-field="payment" ${checkoutData.payment === 'upi' ? 'checked' : ''} />
            <span class="pay-option__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg></span>
            <div>
              <div class="pay-option__title">Pay Now via UPI</div>
              <div class="pay-option__sub">You'll get a payment link on the next step</div>
            </div>
          </label>
        </div>
      </div>`;

    drawerFooter.innerHTML = `
      <div class="drawer__checkout">
        <button class="btn-primary" id="placeOrderBtn">Place Order · ${money(grandTotal)}</button>
      </div>`;

    document.getElementById('placeOrderBtn').addEventListener('click', attemptPlaceOrder);
    ['name', 'phone', 'address'].forEach(f => showFieldError(f, false));
  }

  document.addEventListener('input', (e) => {
    const f = e.target.dataset.field;
    if (!f || drawerStep !== 'checkout') return;
    if (f === 'payment') { checkoutData.payment = e.target.value; return; }
    checkoutData[f] = e.target.value;
    showFieldError(f, false);
  });

  document.addEventListener('focusout', (e) => {
    const f = e.target.dataset.field;
    if (!f || f === 'payment' || drawerStep !== 'checkout') return;
    checkoutTouched[f] = true;
    showFieldError(f, true);
  });

  drawerBack.addEventListener('click', () => {
    drawerStep = 'cart';
    renderCartStep();
  });

  function attemptPlaceOrder(){
    checkoutTouched = { name: true, phone: true, address: true };
    ['name', 'phone', 'address'].forEach(f => showFieldError(f, true));
    const firstInvalid = ['name', 'phone', 'address'].find(f => !fieldValid(f));
    if (firstInvalid){
      const el = document.querySelector(`[data-field="${firstInvalid}"]`);
      if (el) el.focus();
      return;
    }
    placeOrderFinal();
  }

  async function sendOrderToKitchen(order){
    const res = await fetch('/api/send-order-godhuli', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(order),
    });
    let data = {};
    try { data = await res.json(); } catch (e) { /* non-JSON error response */ }
    if (!res.ok || !data.success){
      throw new Error(data.error || 'Request failed');
    }
    return data;
  }

  async function placeOrderFinal(){
    if (placingOrder) return;

    const subtotal = cartSubtotal();
    const deliveryFee = subtotal >= FREE_DELIVERY_MIN ? 0 : DELIVERY_FEE;
    const order = {
      orderId: 'GDH' + Math.floor(1000 + Math.random() * 9000),
      name: checkoutData.name.trim(),
      phone: normalizePhone(checkoutData.phone),
      address: checkoutData.address.trim(),
      payment: checkoutData.payment,
      items: Object.entries(cart).map(([id, item]) => ({ id, name: item.name, price: item.price, qty: item.qty })),
      itemTotal: subtotal,
      deliveryFee,
      grandTotal: subtotal + deliveryFee,
    };

    placingOrder = true;
    checkoutError = '';
    const btn = document.getElementById('placeOrderBtn');
    if (btn){ btn.disabled = true; btn.textContent = 'Placing order…'; }

    try {
      await sendOrderToKitchen(order);
      lastOrder = order;
      drawerStep = 'success';
      renderSuccessStep();
    } catch (err){
      console.error('Order notification failed:', err);
      checkoutError = "Couldn't reach the kitchen. Please check your connection and try again.";
      renderCheckoutStep();
    } finally {
      placingOrder = false;
    }
  }

  function renderSuccessStep(){
    setDrawerHeader('Order Placed', false);
    drawerBody.innerHTML = `
      <div class="order-success">
        <div class="success-ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h3>Order placed!</h3>
        <p>We're firing up the kitchen. Estimated delivery in 30–35 mins.</p>
        <span class="oid">Order ${esc(lastOrder.orderId)}</span>
      </div>
      <div class="checkout-summary">
        <div class="summary-row"><span>Name</span><span>${esc(lastOrder.name)}</span></div>
        <div class="summary-row"><span>WhatsApp</span><span>${esc(lastOrder.phone)}</span></div>
        <div class="summary-row"><span>Payment</span><span>${lastOrder.payment === 'cod' ? 'Pay on Delivery' : 'Pay via UPI'}</span></div>
        <div class="summary-row total"><span>Grand Total</span><span class="num">${money(lastOrder.grandTotal)}</span></div>
      </div>
      <div class="form-hint" style="margin:-8px 0 16px;">Delivering to: ${esc(lastOrder.address)}</div>`;

    drawerFooter.innerHTML = `
      <div class="drawer__checkout">
        <button class="btn-primary" id="continueBtn">Continue Browsing</button>
      </div>`;
    document.getElementById('continueBtn').addEventListener('click', () => {
      cart = {};
      checkoutData = { name: '', phone: '', address: '', payment: 'cod' };
      checkoutTouched = { name: false, phone: false, address: false };
      drawerStep = 'cart';
      updateCartBar();
      renderMenu();
      observeReveals();
      closeDrawer();
    });
  }

  // ---------- Veg Only toggle ----------
  document.getElementById('vegToggle').addEventListener('change', (e) => {
    document.body.classList.toggle('veg-only', e.target.checked);
  });

  // ---------- Hero CTA ----------
  document.getElementById('viewMenuBtn').addEventListener('click', () => {
    const first = document.querySelector('.menu-section');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ---------- Sticky states (topbar + catnav) ----------
  const topbar = document.getElementById('topbar');
  const catnav = document.getElementById('catnav');
  function onScroll(){
    const y = window.scrollY;
    topbar.classList.toggle('scrolled', y > 40);
    catnav.classList.toggle('stuck', y > (window.innerHeight * 0.55));
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  // ---------- Category nav + scrollspy ----------
  function initCategoryNav(){
    const pills = document.querySelectorAll('.cat-pill');
    let suppressObserver = false;
    pills.forEach(p => {
      p.addEventListener('click', () => {
        pills.forEach(x => x.classList.toggle('active', x === p));
        suppressObserver = true;
        const target = document.getElementById(p.dataset.target);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        window.clearTimeout(p._suppressTimer);
        p._suppressTimer = window.setTimeout(() => { suppressObserver = false; }, 700);
      });
    });

    const sections = document.querySelectorAll('.menu-section');
    if ('IntersectionObserver' in window){
      const observer = new IntersectionObserver((entries) => {
        if (suppressObserver) return;
        entries.forEach(entry => {
          if (entry.isIntersecting){
            pills.forEach(p => p.classList.toggle('active', p.dataset.target === entry.target.id));
          }
        });
      }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
      sections.forEach(s => observer.observe(s));
    }
  }

  // ---------- Scroll reveal ----------
  let revealObserver = null;
  function observeReveals(){
    const els = document.querySelectorAll('.reveal:not(.in)');
    if (!('IntersectionObserver' in window)){ els.forEach(el => el.classList.add('in')); return; }
    if (!revealObserver){
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting){ entry.target.classList.add('in'); revealObserver.unobserve(entry.target); }
        });
      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
    }
    els.forEach(el => revealObserver.observe(el));
  }

  // ---------- Init ----------
  buildScaffold();
  renderMenu();
  initCategoryNav();
  observeReveals();
  updateCartBar();
  onScroll();
</script>
</body>
</html>
